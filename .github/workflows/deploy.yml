name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Clean npm cache
      run: npm cache clean --force

    - name: Install dependencies
      timeout-minutes: 8
      run: |
        npm ci --prefer-offline --no-audit --progress=false
        npx vite --version

    - name: Build
      timeout-minutes: 5
      run: npm run build
      env:
        NODE_ENV: production
        CI: false

    # 预渲染（SSG）：把首页渲染后的 HTML 写回 dist。best-effort：
    # 整步 continue-on-error，任何失败都不阻断部署（退化为 CSR + 静态 meta）。
    # puppeteer 仅 CI 构建期需要，临时安装（--no-save 不写入 lockfile）。
    - name: Prerender (SSG)
      continue-on-error: true
      timeout-minutes: 6
      env:
        PUPPETEER_SKIP_DOWNLOAD: 'true'
      run: |
        npm install puppeteer@^23 --no-save --no-audit --progress=false
        npx puppeteer browsers install chrome
        npm run prerender

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Verify build output
      run: |
        ls -la dist/
        if [ ! -f "dist/index.html" ]; then
          echo "Error: dist/index.html not found"
          exit 1
        fi
        # 软校验：预渲染是否成功（失败不阻断部署，仅告警）
        if grep -q "What is Wiggly Paint?" dist/index.html; then
          echo "✅ Prerender OK: homepage content baked into dist/index.html"
        else
          echo "::warning::Prerender did not bake homepage content; deploying CSR fallback"
        fi
        echo "Build verification successful"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        timeout: 600000
        error_count: 10
        reporting_interval: 5000