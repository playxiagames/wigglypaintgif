<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 首页静态 SEO（首页直出，不依赖 JS；子页面由 SEOHead 在运行时覆盖） -->
    <title>Wiggly Paint - Free Animated GIF Creator & Drawing Tool</title>
    <meta name="description" content="Transform doodles into animated GIFs with Wiggly Paint's wiggling effects. Free online drawing tool with 8 animated brushes and instant export.">
    <link rel="canonical" href="https://wigglypaintgif.com/" />
    <!-- 结构化数据：WebApplication（免费在线工具） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Wiggly Paint",
      "alternateName": "WigglyPaint",
      "url": "https://wigglypaintgif.com/",
      "description": "Free online animated GIF drawing tool. Draw with wiggling animated brushes and export your doodles as GIFs instantly — no download, no login required.",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Any (web browser)",
      "browserRequirements": "Requires JavaScript. Works in modern browsers on desktop, mobile and tablet.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "8 animated wiggling brushes",
        "Instant GIF export",
        "No registration required",
        "Works on desktop, mobile and tablet"
      ]
    }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CJN0M0XY2V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-CJN0M0XY2V');
    </script>
    <!-- Click Pageview -->
    <script defer data-domain="wigglypaintgif.com" src="https://click.pageview.click/js/script.js"></script>

    <!-- GitHub Pages SPA redirect hack -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
